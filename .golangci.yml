version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - gocyclo
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
    gocyclo:
      min-complexity: 15

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  exclude-dirs:
    - vendor
    - docs
